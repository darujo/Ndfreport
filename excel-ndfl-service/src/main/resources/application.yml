server:
  port: 8280
  servlet:
    context-path: /app-ndfl
spring:
#  flyway:
#    enabled: true
  main:
    banner-mode: off
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ndfl?options=--search_path%3Dndfl
    username: postgres
    password: 5397


  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    open-in-view: false

  jackson:
    default-property-inclusion: non_absent
  servlet:
    multipart:
      enabled: true
      # Threshold after which the files are written to a disk.
      file-size-threshold: 2KB
        # Max file size.
      max-file-size: 50MB
        # Max Request Size
      max-request-size: 1000MB


file:
  save-into: "c:\\11\\ndfl"
  save-report: "C:/java/NDFLBroker/report/ss"